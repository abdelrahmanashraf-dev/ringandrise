<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Ring and Rise | Real Estate Cold Calling &amp; Lead Generation</title>
    <meta name="description" content="Ring and Rise helps real estate wholesalers close more deals with expert cold calling. Get qualified motivated seller leads and book more appointments." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Ring and Rise" />
    <link rel="canonical" href="https://ringandrise.com" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ringandrise.com" />
    <meta property="og:title" content="Ring and Rise | Real Estate Cold Calling &amp; Lead Generation" />
    <meta property="og:description" content="Ring and Rise helps real estate wholesalers close more deals with expert cold calling. Get qualified motivated seller leads and book more appointments." />
    <meta property="og:image" content="https://ringandrise.com/og-image.jpg" />
    <meta property="og:site_name" content="Ring and Rise" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ringandrise.com" />
    <meta name="twitter:title" content="Ring and Rise | Real Estate Cold Calling &amp; Lead Generation" />
    <meta name="twitter:description" content="Ring and Rise helps real estate wholesalers close more deals with expert cold calling. Get qualified motivated seller leads and book more appointments." />
    <meta name="twitter:image" content="https://ringandrise.com/og-image.jpg" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Ring and Rise",
      "url": "https://ringandrise.com",
      "logo": "https://ringandrise.com/logo.svg",
      "description": "Ring and Rise helps real estate wholesalers close more deals with expert cold calling. Get qualified motivated seller leads and book more appointments.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "info@ringandrise.com"
      },
      "sameAs": [],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Real Estate Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cold Calling" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Seller Lead Generation" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Skiptracing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Appointment Setting" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "CRM Setup" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Lead Nurturing & Follow Up" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
